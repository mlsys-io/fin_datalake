# Kafka Deployment for Demo Sources
# Uses Strimzi operator for easy Kafka management in K8s
# If Strimzi is not available, use the standalone deployment below
---
# Option 1: Standalone Kafka (simpler, no operator needed)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: demo-sources
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:latest
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: kafka-internal
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "1"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.demo-sources.svc.cluster.local:9092"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka
      volumes:
        - name: kafka-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: demo-sources
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      nodePort: 30909 # External access via <node-ip>:30909
---
# Kafka Producer Job (optional - run manually or as CronJob)
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-producer
  namespace: demo-sources
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: producer
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install kafka-python && \
              python /scripts/producer.py --bootstrap kafka.demo-sources.svc:9092 --topic ohlc-events
          volumeMounts:
            - name: producer-script
              mountPath: /scripts
      volumes:
        - name: producer-script
          configMap:
            name: kafka-producer-script
