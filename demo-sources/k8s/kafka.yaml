# Kafka Deployment for Demo Sources
# Uses Apache Kafka official image in KRaft mode (no Zookeeper)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: demo-sources
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
              name: kafka
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.demo-sources.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: CLUSTER_ID
              value: "demo-kafka-cluster-001"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: demo-sources
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      nodePort: 30909
---
# Kafka Producer Job (optional)
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-producer
  namespace: demo-sources
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: producer
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install kafka-python && \
              python /scripts/producer.py --bootstrap kafka.demo-sources.svc:9092 --topic ohlc-events
          volumeMounts:
            - name: producer-script
              mountPath: /scripts
      volumes:
        - name: producer-script
          configMap:
            name: kafka-producer-script
