# Static File Server Deployment
# Serves CSV files over HTTP for pipeline access
# Files are mounted from the static-data ConfigMap
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-server
  namespace: demo-sources
  labels:
    app: static-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-server
  template:
    metadata:
      labels:
        app: static-server
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          env:
            - name: NGINX_WORKER_PROCESSES
              value: "2"
          volumeMounts:
            - name: static-data
              mountPath: /usr/share/nginx/html/data
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: static-data
          configMap:
            name: static-data
        - name: nginx-config
          configMap:
            name: nginx-static-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-static-config
  namespace: demo-sources
data:
  nginx.conf: |
    worker_processes 2;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 64;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;
        
        server {
            listen 80;
            server_name localhost;
            
            location / {
                root /usr/share/nginx/html;
                autoindex on;
                add_header Access-Control-Allow-Origin *;
            }
            
            location /data/ {
                alias /usr/share/nginx/html/data/;
                autoindex on;
                add_header Access-Control-Allow-Origin *;
            }
            
            location /health {
                return 200 'OK';
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: static-server
  namespace: demo-sources
  labels:
    app: static-server
spec:
  type: NodePort
  selector:
    app: static-server
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30880
