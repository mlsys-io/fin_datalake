# WebSocket Server Deployment
# Mock streaming server for monitoring_demo.py
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-websocket
  namespace: demo-sources
  labels:
    app: demo-websocket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-websocket
  template:
    metadata:
      labels:
        app: demo-websocket
    spec:
      containers:
        - name: websocket
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install websockets && \
              python /app/server.py --host 0.0.0.0 --port 8765
          ports:
            - containerPort: 8765
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: server-script
              mountPath: /app
      volumes:
        - name: server-script
          configMap:
            name: websocket-server-script
---
apiVersion: v1
kind: Service
metadata:
  name: demo-websocket
  namespace: demo-sources
  labels:
    app: demo-websocket
spec:
  type: NodePort
  selector:
    app: demo-websocket
  ports:
    - name: ws
      port: 8765
      targetPort: 8765
      nodePort: 30876 # External access via <node-ip>:30876
