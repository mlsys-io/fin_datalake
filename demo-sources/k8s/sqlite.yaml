# SQLite Database Deployment
# Uses ConfigMap for scripts (defined in configmaps.yaml)
# Init container creates demo.db, then serve.py exposes HTTP API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlite-server
  namespace: demo-sources
  labels:
    app: sqlite-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlite-server
  template:
    metadata:
      labels:
        app: sqlite-server
    spec:
      initContainers:
        - name: setup-db
          image: python:3.11-slim
          command: ["python", "/scripts/setup_db.py"]
          env:
            - name: DB_PATH
              value: "/data/demo.db"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: data
              mountPath: /data
      containers:
        - name: server
          image: python:3.11-slim
          command: ["python", "/scripts/serve.py"]
          ports:
            - containerPort: 8080
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: DB_PATH
              value: "/data/demo.db"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: sqlite-scripts
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sqlite-server
  namespace: demo-sources
  labels:
    app: sqlite-server
spec:
  type: NodePort
  selector:
    app: sqlite-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30808 # Access via <node-ip>:30808
