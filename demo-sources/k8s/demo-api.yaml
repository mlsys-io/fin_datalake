# Demo API Server Deployment
# Exposes endpoints for ETL pipeline demos via NodePort
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: demo-sources
  labels:
    app: demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: demo-api
          image: demo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: demo-api
  namespace: demo-sources
  labels:
    app: demo-api
spec:
  type: NodePort
  selector:
    app: demo-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800 # External access via <node-ip>:30800
