apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: ray-etl
  namespace: default
spec:
  rayClusterSpec:
    rayVersion: "2.49.1"
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: "0.0.0.0"
      template:
        spec:
          volumes:
            - name: minio-ca
              configMap:
                name: minio-ca
            - name: local-dataset
              hostPath:
                path: /home/szy/data/dataset-slim
                type: Directory
            - name: code
              hostPath:
                path: /home/szy/ai-lakehouse/app-code
                type: Directory
          containers:
            - name: ray-head
              image: rayproject/ray:2.49.1
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - name: minio-ca
                  mountPath: /opt/certs
                  readOnly: true
                - name: local-dataset
                  mountPath: /mnt/data
                  readOnly: true
                - name: code
                  mountPath: /opt/app
                  readOnly: true
              env:
                - name: MINIO_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: minio-creds
                      key: username
                - name: MINIO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minio-creds
                      key: password
                - name: MINIO_SERVER_URL
                  value: "https://192.168.0.202:4000"
                - name: CA_PATH
                  value: "/opt/certs/public.crt"
                - name: INPUT_PATH
                  value: "/mnt/data"
                - name: DELTA_ROOT
                  value: "s3://delta-lake/ray-etl-basic"
                - name: RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION
                  value: "0.8"
                - name: HMS_HOST
                  value: "hms-hive-metastore.hive.svc"
                - name: HMS_PORT
                  value: "9083"
                - name: HMS_DB
                  value: "ray-etl-basic"
                - name: PYTHONPATH
                  value: /opt/app/ioutils/hms_client
                - name: MAX_CONCURRENCY
                  value: "4"
    workerGroupSpecs:
      - groupName: workers
        replicas: 2
        minReplicas: 2
        maxReplicas: 6
        template:
          spec:
            volumes:
              - name: minio-ca
                configMap:
                  name: minio-ca
              - name: local-dataset
                hostPath:
                  path: /home/szy/data/dataset-slim
                  type: Directory
              - name: code
                hostPath:
                  path: /home/szy/ai-lakehouse/app-code
                  type: Directory
            containers:
              - name: ray-worker
                image: rayproject/ray:2.49.1
                imagePullPolicy: IfNotPresent
                volumeMounts:
                  - name: minio-ca
                    mountPath: /opt/certs
                    readOnly: true
                  - name: local-dataset
                    mountPath: /mnt/data
                    readOnly: true
                  - name: code
                    mountPath: /opt/app
                    readOnly: true
                env:
                  - name: MINIO_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: minio-creds
                        key: username
                  - name: MINIO_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: minio-creds
                        key: password
                  - name: MINIO_SERVER_URL
                    value: "https://192.168.0.202:4000"
                  - name: CA_PATH
                    value: "/opt/certs/public.crt"
                  - name: INPUT_PATH
                    value: "/mnt/data"
                  - name: DELTA_ROOT
                    value: "s3://delta-lake/ray-etl-basic"
                  - name: RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION
                    value: "0.8"
                  - name: HMS_HOST
                    value: "hms-hive-metastore.hive.svc"
                  - name: HMS_PORT
                    value: "9083"
                  - name: HMS_DB
                    value: "ray-etl-basic"
                  - name: PYTHONPATH
                    value: /opt/app/ioutils/hms_client
                  - name: MAX_CONCURRENCY
                    value: "4"

  entrypoint: >
    python /opt/app/etl.py

  # Install deps at runtime (or bake into an image)
  runtimeEnvYAML: |
    pip:
      - deltalake
      - thrift==0.22.0
      - loguru
      - fsspec==2025.9.0
      - beautifulsoup4
      - lxml

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 60
