"""
Read  s3a://raw-dataset/news.json  (array of dicts),
concatenate ALL "summary" values into ONE string,
and write  s3a://raw-dataset/news-combined.json
containing a single JSON object:
{ "combined_summary": "<whole text>" }
"""

from pyspark.sql import SparkSession
from pyspark.sql.functions import collect_list, concat_ws

spark = SparkSession.builder.appName("combine-news").getOrCreate()

# --- read
df = spark.read.option("multiLine", "true").json("s3a://raw-dataset/news.json")

# --- collapse every summary into one string
one_row = (
    df.select(
        concat_ws(" ", collect_list("summary")).alias("combined_summary")
    )
)

# --- write exactly one JSON file with one object
if df.rdd.isEmpty():
    spark.createDataFrame([("",)], ["combined_summary"]).write.mode("overwrite")\
        .json("s3a://raw-dataset/news-combined")
else:
    (one_row.repartition(1).write.mode("overwrite")
            .json("s3a://raw-dataset/news-combined"))

spark.stop()

