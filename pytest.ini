[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers
testpaths =
    tests

# Register custom markers to avoid verbose warnings and enforce clear boundaries
markers =
    unit: Fast tests that test a single unit of logic in isolation. Does not require Spark, Ray, or databases.
    integration: Slower tests that test interactions between components (e.g., requires a local Ray cluster or an ephemeral DB).
    e2e: End-to-end tests that simulate full data flows and user journeys.
