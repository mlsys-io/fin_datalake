# --- Deployment mode ---
mode: standalone # standalone | distributed
replicas: 1 # Not applicable in standalone mode

# --- Disable persistence (ephemeral) ---
persistence:
  enabled: true
  size: 8Gi
  storageClass: standard

# --- Pre-create buckets ---
buckets:
  - name: raw-dataset
    policy: none
    purge: false
  - name: delta-lake
    policy: none
    purge: false
  - name: hive
    policy: none
    purge: false

# --- Pre-create users and their keys/policies ---
users:
  - accessKey: hive
    secretKey: hivehive
    policy: readwrite

# --- Resource requests/limits ---
resources:
  requests:
    memory: 1Gi
    cpu: 250m          # sensible default; adjust as needed
  limits:
    memory: 2Gi
    cpu: 1000m

# --- Service for S3 API ---
service:
  type: NodePort
  port: 9000
  nodePort: 30000

# --- Service for MinIO Console ---
consoleService:
  type: NodePort
  port: 9001
  nodePort: 30001

# --- Extra (optional but recommended) ---
rootUser: ""          # auto-generated if left empty
rootPassword: ""      # auto-generated if left empty
