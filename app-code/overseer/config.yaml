# ============================================================
# Overseer Service Configuration
# ============================================================
# Each entry defines a service the Overseer monitors.
# Add a new service = add 4 lines here + one Collector class.
#
# Environment variable overrides:
#   OVERSEER_RAY_HOST, OVERSEER_RAY_PORT, etc.
# ============================================================

services:
  ray:
    host: localhost
    port: 8265
    protocol: http
    health_path: /api/v0/cluster_status

  kafka:
    host: localhost
    port: 9092
    protocol: kafka
    extra:
      consumer_group: etl-consumer-group

  prefect:
    host: localhost
    port: 4200
    protocol: http
    health_path: /api/health

  minio:
    host: localhost
    port: 9000
    protocol: http
    health_path: /minio/health/live

  gateway:
    host: localhost
    port: 8000
    protocol: http
    health_path: /healthz

  delta_lake:
    host: minio
    port: 9000
    protocol: s3

# ============================================================
# Overseer behaviour
# ============================================================
overseer:
  loop_interval_seconds: 5
  respawn_recovery_timeout_seconds: 60
  metrics_history_size: 200
  builtin_policies:
    enabled: true
    actor_health_enabled: true
    kafka_lag_enabled: true
    kafka_scale_up_threshold: 500
    kafka_scale_up_count: 1
    kafka_scale_down_idle_threshold: 0
    kafka_scale_down_count: 1
    kafka_agent_class: SentimentAgent

  custom_policies:
    s3_uri: "s3://delta-lake/overseer-policies/"
    sync_interval_seconds: 60
    local_dir: "/tmp/overseer_custom_policies/"
