{{- if and .Values.gateway.enabled .Values.gateway.secretEnv.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-lakehouse-platform.gatewaySecretName" . }}
  labels:
    {{- include "ai-lakehouse-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{- range $key, $value := .Values.gateway.secretEnv.stringData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
