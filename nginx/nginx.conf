# =============================================================================
#  Lakehouse Launchpad — Nginx Bouncer Configuration
# =============================================================================
#
#  This file acts as the single entry point for all external traffic.
#  It secures internal services (Prefect, Ray, MinIO) by delegating auth
#  to the FastAPI Gateway using the auth_request module.
#
#  Run on Port 8080 locally so it doesn't conflict with dev servers.
#
#  How to use:
#    nginx -c <absolute-path-to-this-file> -p <nginx-install-dir>
#    or on WSL/Linux: sudo nginx -c /path/to/nginx.conf
#
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # ------------------------------------------------------------------
    # Upstream servers (backend services running locally)
    # ------------------------------------------------------------------
    upstream gateway      { server 127.0.0.1:8000; }
    upstream vite_dev     { server 127.0.0.1:5173; }
    upstream prefect      { server 127.0.0.1:4200; }
    upstream ray          { server 127.0.0.1:32382; }
    upstream minio        { server 127.0.0.1:9001; }

    server {
        listen 8080;
        server_name localhost;

        # Increase proxy buffer sizes for larger UIs (Prefect/Ray)
        proxy_buffer_size           128k;
        proxy_buffers               4 256k;
        proxy_busy_buffers_size     256k;

        # Forward important headers to all upstreams
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Enable WebSocket proxying (needed for Vite HMR, Prefect, Ray)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # --------------------------------------------------------------
        # Internal auth verification endpoint (never exposed publicly)
        #
        # Nginx calls this endpoint internally before proxying requests
        # to protected services. The Gateway validates the JWT cookie
        # and returns 200 OK or 401 Unauthorized.
        # --------------------------------------------------------------
        location = /auth-verify {
            internal;
            proxy_pass              http://gateway/api/v1/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
        }

        # --------------------------------------------------------------
        # FastAPI Gateway: /api/
        #
        # All API calls from the React app (auth, intents) route here.
        # This is NOT protected by auth_request — it IS the auth provider.
        # --------------------------------------------------------------
        location /api/ {
            proxy_pass http://gateway;
        }

        # --------------------------------------------------------------
        # Prefect Dashboard: /prefect/
        #
        # Protected by auth_request. Only accessible after login.
        # The Gateway injects the authenticated username as a header.
        # --------------------------------------------------------------
        location /prefect/ {
            auth_request /auth-verify;

            # Capture the X-Remote-User header from the Gateway response
            # and pass it to Prefect so it knows who is viewing the UI.
            auth_request_set    $auth_user $upstream_http_x_remote_user;
            proxy_set_header    X-Remote-User $auth_user;

            # Redirect to the React login page on 401
            error_page 401 = @login_redirect;

            # Strip the /prefect prefix before passing to Prefect
            rewrite ^/prefect/(.*)$ /$1 break;
            proxy_pass http://prefect;
        }

        # --------------------------------------------------------------
        # Ray Dashboard: /ray/
        # --------------------------------------------------------------
        location /ray/ {
            auth_request /auth-verify;

            auth_request_set    $auth_user $upstream_http_x_remote_user;
            proxy_set_header    X-Remote-User $auth_user;

            error_page 401 = @login_redirect;

            rewrite ^/ray/(.*)$ /$1 break;
            proxy_pass http://ray;
        }

        # --------------------------------------------------------------
        # MinIO Console: /minio/
        # --------------------------------------------------------------
        location /minio/ {
            auth_request /auth-verify;

            auth_request_set    $auth_user $upstream_http_x_remote_user;
            proxy_set_header    X-Remote-User $auth_user;

            error_page 401 = @login_redirect;

            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass http://minio;
        }

        # --------------------------------------------------------------
        # React Frontend (catch-all): /
        #
        # All other requests (including the login page) serve the Vite
        # dev server. In production, replace with:
        #   root /path/to/frontend/dist;
        #   try_files $uri $uri/ /index.html;
        # --------------------------------------------------------------
        location / {
            proxy_pass http://vite_dev;
        }

        # Named location that auth_request errors redirect to
        location @login_redirect {
            return 302 /?redirect=$request_uri;
        }
    }
}
