# values.yaml
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: tsdb
  namespace: postgres-operator
spec:
  # Newest major
  postgresVersion: 17

  # Use your custom image that contains the vectorscale binaries
  image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi9-17.5-2520

  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi

  # Preload useful libs (pgvector does not require preload; TimescaleDB does.)
  config:
    parameters:
      shared_preload_libraries: "timescaledb,pg_stat_statements"

  # App user + DB
  users:
    - name: app
      databases: ["app"]
      options: "SUPERUSER"   # tighten later if you prefer

  # Simple pgBackRest repo on PVC (easy to start)
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi

  # Run the one-time SQL above
  databaseInitSQL:
    name: tsdb-init-sql
    key: init.sql
