apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hms.fullname" . }}-metastore-site
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"  # runs before the Job (weight 0)
data:
  metastore-site.xml: |
    <configuration>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>{{ .Values.db.url }}</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>${env.HMS_DB_USER}</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>${env.HMS_DB_PASSWORD}</value>
      </property>
    </configuration>
