apiVersion: v1
kind: Service
metadata:
  name: {{ include "hms.fullname" . }}
  labels:
    {{- include "hms.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "hms.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: thrift
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
