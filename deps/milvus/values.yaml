# Milvus Standalone Mode Configuration
# Reduces from ~25 pods to ~3-4 pods

# Standalone mode (single pod for all Milvus components)
cluster:
  enabled: false

standalone:
  replicas: 1
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 512Mi

# Disable Pulsar - use RocksMQ instead (embedded)
pulsarv3:
  enabled: false

# Single etcd instance
etcd:
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi

# Single MinIO instance
minio:
  mode: standalone
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi

# Service configuration
service:
  type: NodePort
  port: 19530
  nodePort: 31530
