  extraEnvVars:
    - name: AWS_CA_BUNDLE
      value: /opt/minio-ca/ca.crt
    - name: SSL_CERT_FILE
      value: /opt/minio-ca/ca.crt

compactorComponent:
  extraVolumes:
    - name: minio-ca
      secret:
        secretName: minio-ca
  extraVolumeMounts:
    - name: minio-ca
