apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hms.fullname" . }}-core-site
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"  # runs before the Job (weight 0)
data:
  core-site.xml: |
    <configuration>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>{{ .Values.s3.endpoint }}</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>{{ .Values.s3.pathStyleAccess }}</value>
      </property>

      # If your MinIO is HTTP (not TLS), set this to false:
      {{- if hasPrefix "http://" .Values.s3.endpoint }}
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>false</value>
      </property>
      {{- end }}
      <!-- We deliberately avoid putting access keys here -->
    </configuration>
